# Tiny config for smoke testing.
#
# Goal: prove the pipeline runs top-to-bottom in under a minute.
# Will NOT produce a useful policy — exploitability will be high.
# Use only for development and CI.

iterations: 2
num_traversals: 4
learning_rate: 0.001
memory_capacity: 10000

advantage_network_layers: [16, 16]
policy_network_layers: [16, 16]
advantage_train_steps: 10
policy_train_steps: 10
batch_size_advantage: 32
batch_size_strategy: 64

seed: 42

skip_exploitability: false
