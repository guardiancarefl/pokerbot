# Phase 2d 200bb overnight training run on Contabo CPU.
# Reverted to bench-proven config (50 traversals, 100 train steps, [64,64])
# after [128,128]/100/200 variant didn't complete iter 1 in 4+ min.
# At ~49s/iter, 300 iters ≈ 4 hours.
tag: phase2d_200bb_overnight
abstraction_path: runs/abstraction_20260521_223018/abstraction.pkl
# Structured game params (preferred over legacy game_str).
# Reproduces the HUNL 200bb shape Phase 2d trained against.
# starting_stack below is shared between the game (per-player chip count)
# and the solver (TrainConfig.starting_stack).
num_players: 2
big_blind: 100
small_blind: 50
hidden_dim: [64, 64]
n_iterations: 300
traversals_per_iter: 50
train_steps_per_iter: 100
batch_size: 32
learning_rate: 0.001
buffer_capacity: 100000
starting_stack: 20000
bucket_runouts: 30
max_traversal_depth: 600
seed: 2026
checkpoint_every: 25
